version: '3.8'

services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-chatbot
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=${APP_NAME:-AI Documentation Chatbot}
      - DEBUG=${DEBUG:-false}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-ada-002}
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - TOP_K_RESULTS=${TOP_K_RESULTS:-5}
      - VECTOR_STORE=${VECTOR_STORE:-local}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-dda-docs}
      - PINECONE_CLOUD=${PINECONE_CLOUD:-aws}
      - PINECONE_REGION=${PINECONE_REGION:-us-east-1}
      - PINECONE_DIMENSION=${PINECONE_DIMENSION:-}
      - PINECONE_METRIC=${PINECONE_METRIC:-cosine}
      - PINECONE_NAMESPACE=${PINECONE_NAMESPACE:-}
      - PINECONE_CREATE_INDEX=${PINECONE_CREATE_INDEX:-true}
      - AUTO_INGEST_ON_STARTUP=${AUTO_INGEST_ON_STARTUP:-true}
      - ENABLE_MEMORY=${ENABLE_MEMORY:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - AGENT_MAX_ITERATIONS=${AGENT_MAX_ITERATIONS:-10}
      - AGENT_MAX_TOOL_CALLS=${AGENT_MAX_TOOL_CALLS:-20}
      - AGENT_MAX_WORKING_MEMORY_UPDATES=${AGENT_MAX_WORKING_MEMORY_UPDATES:-10}
      - AGENT_OPENAI_MODEL=${AGENT_OPENAI_MODEL:-}
      - AGENT_TOOL_TIMEOUT_SEC=${AGENT_TOOL_TIMEOUT_SEC:-30}
      - AGENT_RATE_LIMIT_PER_MINUTE=${AGENT_RATE_LIMIT_PER_MINUTE:-30}
      - AGENT_TRACE_PERSIST=${AGENT_TRACE_PERSIST:-true}
      - AGENT_TRACE_DIR=${AGENT_TRACE_DIR:-./logs/agent_traces}
      - AGENT_APPROVAL_SECRET=${AGENT_APPROVAL_SECRET:-}
      - AGENT_HTTP_ALLOWLIST_HOSTS=${AGENT_HTTP_ALLOWLIST_HOSTS:-}
      - AGENT_HTTP_MAX_BYTES=${AGENT_HTTP_MAX_BYTES:-524288}
      - SLACK_POST_CHANNEL_ALLOWLIST=${SLACK_POST_CHANNEL_ALLOWLIST:-}
      - AGENT_WORKING_MEMORY_ENABLED=${AGENT_WORKING_MEMORY_ENABLED:-true}
      - AGENT_WORKING_MEMORY_TTL_HOURS=${AGENT_WORKING_MEMORY_TTL_HOURS:-2}
    volumes:
      - ./docs:/app/docs:ro
      - ./storage:/app/storage
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: n8n for workflow automation
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      # Route Slack workflow to agent or quick query (see n8n/workflow.json)
      - DDA_USE_AGENT=${DDA_USE_AGENT:-true}
      - DDA_AGENT_ALLOW_SENSITIVE=${DDA_AGENT_ALLOW_SENSITIVE:-false}
      - DDA_AGENT_APPROVAL_SECRET=${DDA_AGENT_APPROVAL_SECRET:-}
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    depends_on:
      - chatbot

volumes:
  n8n_data:
