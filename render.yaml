services:
  - type: web
    name: dda-chatbot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements-render.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: openai
      - key: AUTO_INGEST_ON_STARTUP
        value: "true"
      - key: DOCS_DIRECTORY
        value: ./docs
      - key: INDEX_STORAGE_PATH
        value: /tmp/storage/index
      - key: VECTOR_STORE
        value: pinecone
      - key: PINECONE_INDEX_NAME
        value: dda-docs
      - key: PINECONE_CLOUD
        value: aws
      - key: PINECONE_REGION
        value: us-east-1
      - key: PINECONE_METRIC
        value: cosine
      - key: PINECONE_CREATE_INDEX
        value: "true"
      - key: PINECONE_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: LOG_LEVEL
        value: INFO
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_TRACE_DIR
        value: /tmp/logs/agent_traces
      - key: AGENT_TRACE_PERSIST
        value: "true"
      - key: AGENT_APPROVAL_SECRET
        sync: false
      - key: AGENT_HTTP_ALLOWLIST_HOSTS
        value: ""
      - key: SLACK_POST_CHANNEL_ALLOWLIST
        value: ""
      - key: SLACK_BOT_TOKEN
        sync: false
