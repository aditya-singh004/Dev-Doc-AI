services:
  - type: web
    name: dda-chatbot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements-render.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: openai
      - key: AUTO_INGEST_ON_STARTUP
        value: "true"
      - key: DOCS_DIRECTORY
        value: ./docs
      - key: INDEX_STORAGE_PATH
        value: /tmp/storage/index
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: LOG_LEVEL
        value: INFO
      - key: OPENAI_API_KEY
        sync: false
